<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AIcleaner - AI 驱动的磁盘空间清理与文件归类工具" />
  <title data-i18n="app.title">AIcleaner</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    html {
      background: #071015;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 16%, rgba(20, 184, 166, 0.12), transparent 30%),
        radial-gradient(circle at 86% 14%, rgba(56, 189, 248, 0.08), transparent 24%),
        linear-gradient(180deg, #071015 0%, #09141a 48%, #071015 100%);
      color: #e6f1ef;
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: inherit;
      z-index: 9999;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #boot-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-shell {
      width: min(560px, calc(100vw - 48px));
      padding: 28px 24px;
      border-radius: 20px;
      background: rgba(11, 23, 30, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .boot-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .boot-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      box-shadow: 0 0 24px rgba(20, 184, 166, 0.18);
      flex: 0 0 auto;
    }

    .boot-title {
      font: 700 1.2rem/1.2 "Segoe UI", sans-serif;
      letter-spacing: -0.02em;
    }

    .boot-subtitle {
      margin-top: 4px;
      color: #9fb2af;
      font: 400 0.92rem/1.4 "Segoe UI", sans-serif;
    }

    .boot-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
    }

    .boot-bar::before {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0d9488, #14b8a6, #38bdf8);
      animation: boot-slide 1.2s ease-in-out infinite;
    }

    .boot-hint {
      margin-top: 12px;
      color: #6f8482;
      font: 400 0.84rem/1.5 "Segoe UI", sans-serif;
    }

    @keyframes boot-slide {
      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(340%);
      }
    }
  </style>
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <script type="module" src="/src/main.js"></script>
</head>

<body>
  <div id="boot-splash" aria-hidden="true">
    <div class="boot-shell">
      <div class="boot-brand">
        <div class="boot-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6l3 18h12l3-18" />
            <path d="M1 6h22" />
            <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </div>
        <div>
          <div class="boot-title">AIcleaner</div>
          <div id="boot-subtitle" class="boot-subtitle">正在加载工作台...</div>
        </div>
      </div>
      <div class="boot-bar"></div>
      <div id="boot-hint" class="boot-hint">开发模式下首次连接前端资源会稍慢一些，但不应再出现空白窗口。</div>
    </div>
  </div>

  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6l3 18h12l3-18" />
            <path d="M1 6h22" />
            <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </div>
        <span class="brand-text">AIcleaner</span>
      </div>

      <ul class="nav-links">
        <li><a href="#/advisor" data-page="advisor" class="nav-link">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                <path d="M8 9h8" />
                <path d="M8 13h5" />
              </svg>
            <span id="nav-advisor-label">顾问</span>
          </a></li>
        </ul>

      <div class="sidebar-provider-action">
        <button id="provider-manager-btn" class="btn btn-provider-manager" data-i18n="topbar.manage_api">服务商 API</button>
        <button id="move-data-dir-sidebar-btn" class="btn btn-sidebar-action" type="button" data-i18n="settings.cache_dir_apply">迁移缓存</button>
      </div>

      <div class="sidebar-footer">
        <span class="version">v1.0.0</span>
        <div class="lang-switch-container">
          <span class="lang-opt" data-lang="zh">中</span>
          <span class="lang-divider">/</span>
          <span class="lang-opt" data-lang="en">EN</span>
        </div>
      </div>
    </nav>

    <main id="content">
      <div id="page-container"></div>
    </main>
  </div>

  <div id="provider-modal" class="app-modal" aria-hidden="true">
    <div class="app-modal-overlay" data-modal-close="true"></div>
    <section class="app-modal-panel card" role="dialog" aria-modal="true" aria-labelledby="provider-modal-title">
      <div class="app-modal-header">
        <div>
          <h2 id="provider-modal-title" class="card-title" data-i18n="provider_modal.title">服务商 API 管理</h2>
          <p class="form-hint modal-subtitle" data-i18n="provider_modal.subtitle">集中配置各服务商 API Key 与默认模型</p>
        </div>
        <button id="provider-modal-close" class="btn btn-ghost" type="button">×</button>
      </div>
      <div id="provider-list" class="provider-list"></div>
      <div class="app-modal-actions">
        <button id="provider-modal-cancel" class="btn btn-ghost" type="button" data-i18n="provider_modal.cancel">取消</button>
        <button id="provider-modal-save" class="btn btn-primary" type="button" data-i18n="provider_modal.save">保存</button>
      </div>
      <div id="provider-close-confirm" class="provider-close-confirm" hidden>
        <div class="provider-close-confirm-backdrop"></div>
        <section class="provider-close-confirm-card card secret-dialog-panel" role="dialog" aria-modal="true"
          aria-labelledby="provider-close-confirm-title">
          <h3 id="provider-close-confirm-title" class="card-title" data-i18n="provider_modal.unsaved_title">未保存变更</h3>
          <p class="secret-dialog-message" data-i18n="provider_modal.unsaved_message">检测到未保存的 API 配置。关闭将丢失所有未保存的修改。</p>
          <div class="app-modal-actions provider-close-confirm-actions">
            <button id="provider-close-confirm-cancel" class="btn btn-ghost" type="button"
              data-i18n="provider_modal.unsaved_continue">继续编辑</button>
            <button id="provider-close-confirm-discard" class="btn btn-danger" type="button"
              data-i18n="provider_modal.unsaved_discard_close">不保存关闭</button>
          </div>
        </section>
      </div>
    </section>
  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AIcleaner - AI 驱动的磁盘空间清理与文件归类工具" />
  <title data-i18n="app.title">AIcleaner</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    html {
      background: #0a0e17;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 70%, rgba(139, 92, 246, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 60%),
        linear-gradient(180deg, #0a0e17 0%, #0f172a 50%, #0a0e17 100%);
      color: #f1f5f9;
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: inherit;
      z-index: 9999;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #boot-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-shell {
      width: min(560px, calc(100vw - 48px));
      padding: 28px 24px;
      border-radius: 20px;
      background: rgba(17, 24, 39, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .boot-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .boot-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.28);
      flex: 0 0 auto;
    }

    .boot-title {
      font: 700 1.2rem/1.2 "Segoe UI", sans-serif;
      letter-spacing: -0.02em;
    }

    .boot-subtitle {
      margin-top: 4px;
      color: #94a3b8;
      font: 400 0.92rem/1.4 "Segoe UI", sans-serif;
    }

    .boot-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.14);
    }

    .boot-bar::before {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #06b6d4, #6366f1, #8b5cf6);
      animation: boot-slide 1.2s ease-in-out infinite;
    }

    .boot-hint {
      margin-top: 12px;
      color: #64748b;
      font: 400 0.84rem/1.5 "Segoe UI", sans-serif;
    }

    @keyframes boot-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(340%); }
    }
  </style>
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <script type="module" src="/src/main.js"></script>
</head>

<body>
  <div id="boot-splash" aria-hidden="true">
    <div class="boot-shell">
      <div class="boot-brand">
        <div class="boot-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6l3 18h12l3-18" />
            <path d="M1 6h22" />
            <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </div>
        <div>
          <div class="boot-title">AIcleaner</div>
          <div class="boot-subtitle">正在加载工作台...</div>
        </div>
      </div>
      <div class="boot-bar"></div>
      <div class="boot-hint">开发模式下首次连接前端资源时会略慢，但不应再出现纯白空窗。</div>
    </div>
  </div>

  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6l3 18h12l3-18" />
            <path d="M1 6h22" />
            <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </div>
        <span class="brand-text">AIcleaner</span>
      </div>

      <ul class="nav-links">
        <li><a href="#/scanner" data-page="scanner" class="nav-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
            <span data-i18n="nav.scanner">扫描</span>
          </a></li>

        <li><a href="#/results" data-page="results" class="nav-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
            <span data-i18n="nav.results">结果</span>
          </a></li>

        <li><a href="#/organizer" data-page="organizer" class="nav-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h5l2 2h11v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" />
              <path d="M8 12h8" />
              <path d="M8 16h5" />
            </svg>
            <span data-i18n="nav.organizer">归类</span>
          </a></li>
      </ul>

      <div class="sidebar-footer">
        <span class="version">v1.0.0</span>
        <div class="lang-switch-container">
          <span class="lang-opt" data-lang="zh">中</span>
          <span class="lang-divider">/</span>
          <span class="lang-opt" data-lang="en">EN</span>
        </div>
      </div>
    </nav>

    <main id="content">
      <header id="topbar" class="topbar">
        <div class="topbar-title-wrap">
          <h1 class="topbar-title" data-i18n="topbar.title">工作台</h1>
          <p class="topbar-subtitle" data-i18n="topbar.subtitle">文件清理与归类</p>
        </div>
        <button id="provider-manager-btn" class="btn btn-provider-manager" data-i18n="topbar.manage_api">服务商 API</button>
      </header>
      <div id="page-container"></div>
    </main>
  </div>

  <div id="provider-modal" class="app-modal" aria-hidden="true">
    <div class="app-modal-overlay" data-modal-close="true"></div>
    <section class="app-modal-panel card" role="dialog" aria-modal="true" aria-labelledby="provider-modal-title">
      <div class="app-modal-header">
        <div>
          <h2 id="provider-modal-title" class="card-title" data-i18n="provider_modal.title">服务商 API 管理</h2>
          <p class="form-hint modal-subtitle" data-i18n="provider_modal.subtitle">集中配置各服务商 API Key 与默认模型</p>
        </div>
        <button id="provider-modal-close" class="btn btn-ghost" type="button">✕</button>
      </div>
      <div id="provider-list" class="provider-list"></div>
      <div class="app-modal-actions">
        <button id="provider-modal-cancel" class="btn btn-ghost" type="button" data-i18n="provider_modal.cancel">取消</button>
        <button id="provider-modal-save" class="btn btn-primary" type="button" data-i18n="provider_modal.save">保存</button>
      </div>
      <div id="provider-close-confirm" class="provider-close-confirm" hidden>
        <div class="provider-close-confirm-backdrop"></div>
        <section class="provider-close-confirm-card card secret-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="provider-close-confirm-title">
          <h3 id="provider-close-confirm-title" class="card-title" data-i18n="provider_modal.unsaved_title">未保存变更</h3>
          <p class="secret-dialog-message" data-i18n="provider_modal.unsaved_message">检测到未保存的 API 配置，关闭前请先保存。</p>
          <div class="app-modal-actions provider-close-confirm-actions">
            <button id="provider-close-confirm-cancel" class="btn btn-ghost" type="button" data-i18n="provider_modal.unsaved_continue">继续编辑</button>
            <button id="provider-close-confirm-save" class="btn btn-primary" type="button" data-i18n="provider_modal.unsaved_save_close">保存并关闭</button>
          </div>
        </section>
      </div>
    </section>
  </div>
</body>

</html>

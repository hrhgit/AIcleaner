<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AIcleaner - AI 驱动的磁盘空间清理与文件归类工具" />
  <title data-i18n="app.title">AIcleaner</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    html {
      background: #071015;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 16%, rgba(20, 184, 166, 0.12), transparent 30%),
        radial-gradient(circle at 86% 14%, rgba(56, 189, 248, 0.08), transparent 24%),
        linear-gradient(180deg, #071015 0%, #09141a 48%, #071015 100%);
      color: #e6f1ef;
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: inherit;
      z-index: 9999;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #boot-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-shell {
      width: min(560px, calc(100vw - 48px));
      padding: 28px 24px;
      border-radius: 20px;
      background: rgba(11, 23, 30, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .boot-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .boot-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      box-shadow: 0 0 24px rgba(20, 184, 166, 0.18);
      flex: 0 0 auto;
    }

    .boot-title {
      font: 700 1.2rem/1.2 "Segoe UI", sans-serif;
      letter-spacing: -0.02em;
    }

    .boot-subtitle {
      margin-top: 4px;
      color: #9fb2af;
      font: 400 0.92rem/1.4 "Segoe UI", sans-serif;
    }

    .boot-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
    }

    .boot-bar::before {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0d9488, #14b8a6, #38bdf8);
      animation: boot-slide 1.2s ease-in-out infinite;
    }

    .boot-hint {
      margin-top: 12px;
      color: #6f8482;
      font: 400 0.84rem/1.5 "Segoe UI", sans-serif;
    }

    @keyframes boot-slide {
      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(340%);
      }
    }
  </style>
  <script type="module" src="/src/main.tsx"></script>
</head>

<body>
  <div id="boot-splash" aria-hidden="true">
    <div class="boot-shell">
      <div class="boot-brand">
        <div class="boot-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6l3 18h12l3-18" />
            <path d="M1 6h22" />
            <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </div>
        <div>
          <div class="boot-title">AIcleaner</div>
          <div id="boot-subtitle" class="boot-subtitle">正在加载工作台...</div>
        </div>
      </div>
      <div class="boot-bar"></div>
      <div id="boot-hint" class="boot-hint">开发模式下首次连接前端资源会稍慢一些，但不应再出现空白窗口。</div>
    </div>
  </div>

  <div id="root"></div>
</body>

</html>
